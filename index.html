<!DOCTYPE html>
<html>
<head>
    <title>Firebase Realtime Database Integration</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js"></script>
    <script>
        // TODO: Replace the following with your app's Firebase project configuration
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT_ID.firebaseio.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Initialize Firebase
        const app = firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Example to write data to the database
        function writeUserData(userId, name, email) {
            database.ref('users/' + userId).set({
                username: name,
                email: email
            });
        }
    </script>
</head>
<body>
    <h1>Firebase Realtime Database Integration</h1>
    <button onclick="writeUserData('1', 'John Doe', 'john@example.com')">Write User Data</button>
</body>
</html>
